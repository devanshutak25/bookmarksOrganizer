<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Organizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        // Apply saved theme before paint to prevent flash (dark is default)
        const saved = localStorage.getItem('theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
        else document.documentElement.setAttribute('data-theme', 'dark');
    </script>
</head>
<body>
    <header>
        <nav>
            <a href="#import" class="nav-link" data-page="import">Import</a>
            <a href="#triage" class="nav-link" data-page="triage">Triage</a>
            <a href="#organize" class="nav-link" data-page="organize">Organize</a>
            <a href="#export" class="nav-link" data-page="export">Export</a>
            <button id="theme-toggle" class="theme-toggle" title="Toggle dark/light mode">
                <span class="theme-icon"></span>
            </button>
        </nav>
    </header>
    <main id="app"></main>
    <div id="toast-container" class="toast-container"></div>
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
